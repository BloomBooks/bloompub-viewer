name: Build/release

on:
  push:
    tags:
      - "v*"
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Install Node.js and pnpm as specified in package.json
        uses: volta-cli/action@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.33.2
          cache: true
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Electron app
        env:
          in_github_action: "true"
        run: pnpm build:ci

      - name: Sign installer
        if: github.event_name != 'pull_request'
        uses: sillsdev/codesign/trusted-signing-action@v3
        with:
          credentials: ${{ secrets.TRUSTED_SIGNING_CREDENTIALS }}
          files-folder: output
          files-folder-filter: BloomPUB*.exe
          description: "BloomPUB Viewer Installer"
          description-url: "https://bloomlibrary.org/bloompub-viewer"

      - name: Create Release
        if: github.event_name != 'pull_request'
        uses: softprops/action-gh-release@v2
        # The signer changes the installer's name from BloomPUB-Viewer-Setup-<x.y.z>.exe to
        # BloomPub.Viewer Setup <x.y.z>.exe.  (Uploading changes spaces to periods.)  The
        # latter is what we want to release. (BL-15534)
        with:
          files: |
            output/BloomPUB *.exe
            output/BloomPUB.*.exe
          name: ${{ github.ref_name }}
          body: |
            Release for version ${{ github.ref_name }}
          draft: true
