name: Build/release

on:
  push:
    tags:
      - "v*"
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Set up Vite+ (Node + pnpm)
        # Reads the Node version from .node-version and the pnpm version from
        # the package.json "packageManager" field. Replaces Volta + pnpm/action-setup.
        uses: voidzero-dev/setup-vp@v1
        with:
          cache: true
          run-install: false

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Build Electron app
        env:
          in_github_action: "true"
        run: vp run build:ci

      - name: Sign installer
        if: github.event_name != 'pull_request'
        uses: sillsdev/codesign/trusted-signing-action@v3
        with:
          credentials: ${{ secrets.TRUSTED_SIGNING_CREDENTIALS }}
          files-folder: output
          files-folder-filter: BloomPUB*.exe
          description: "BloomPUB Viewer Installer"
          description-url: "https://bloomlibrary.org/bloompub-viewer"

      - name: Create Release
        if: github.event_name != 'pull_request'
        uses: softprops/action-gh-release@v2
        # The signer changes the installer's name from BloomPUB-Viewer-Setup-<x.y.z>.exe to
        # BloomPub.Viewer Setup <x.y.z>.exe.  (Uploading changes spaces to periods.)  The
        # latter is what we want to release. (BL-15534)
        with:
          files: |
            output/BloomPUB *.exe
            output/BloomPUB.*.exe
          name: ${{ github.ref_name }}
          body: |
            Release for version ${{ github.ref_name }}
          draft: true

  build-linux:
    runs-on: ubuntu-latest
    # Run after the Windows job so both upload into the same draft release
    # rather than racing to create two separate drafts for the same tag.
    needs: build-windows

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Set up Vite+ (Node + pnpm)
        # Reads the Node version from .node-version and the pnpm version from
        # the package.json "packageManager" field.
        uses: voidzero-dev/setup-vp@v1
        with:
          cache: true
          run-install: false

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Build Electron app
        # On a Linux host this produces the .deb configured in electron-builder.json5.
        # No code signing step: .deb packages are not signed like the Windows installer.
        env:
          in_github_action: "true"
        run: vp run build:ci

      - name: Create Release
        if: github.event_name != 'pull_request'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            output/*.deb
          name: ${{ github.ref_name }}
          body: |
            Release for version ${{ github.ref_name }}
          draft: true
